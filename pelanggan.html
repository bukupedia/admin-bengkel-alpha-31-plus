<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="bingbot" content="noindex, nofollow">
  <meta name="yandex" content="noindex, nofollow">
  <meta name="duckduckbot" content="noindex, nofollow">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#667eea">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <title>Data Pelanggan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="pelanggan">

<div id="navbar"></div>

<div class="container mt-4">
  <div class="d-flex justify-content-between">
    <h3>Data Pelanggan</h3>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPelanggan">
      + Tambah
    </button>
  </div>

  <div class="input-group mt-3">
    <input type="text" id="searchPelanggan" class="form-control" placeholder="Cari pelanggan...">
    <button type="button" class="btn btn-outline-secondary" id="clearSearchPelanggan" title="Hapus">✕</button>
  </div>

  <div class="table-responsive">
    <table class="table mt-3 table-hover">
      <thead class="table-light">
        <tr>
          <th>Nama</th>
          <th>No HP</th>
          <th>No. Polisi</th>
          <th>Jumlah Kendaraan</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="pelangganTable"></tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="modalPelanggan">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Tambah Pelanggan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input id="namaPelanggan" class="form-control mb-2" placeholder="Nama" required>
        <input id="noHp" class="form-control mb-2" placeholder="No HP" type="tel" required>
        <input id="nomorPolisi" class="form-control mb-2" placeholder="Nomor Polisi Kendaraan" required>
        <input id="vehicleBrand" class="form-control mb-2" placeholder="Merek Kendaraan: Honda, Yamaha, Suzuki...">
        <input id="vehicleName" class="form-control" placeholder="Nama Kendaraan: Beat, Mio, Nex...">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary" id="savePelanggan">Simpan</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalEditPelanggan">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Edit Pelanggan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editPelangganId">
        <input id="editNamaPelanggan" class="form-control mb-2" placeholder="Nama" required>
        <input id="editNoHp" class="form-control mb-2" placeholder="No HP" type="tel" pattern="[0-9+\-\s\(\)]*">
        <input id="editNomorPolisi" class="form-control mb-2" placeholder="Nomor Polisi Kendaraan">
        <input id="editVehicleBrand" class="form-control mb-2" placeholder="Merek Kendaraan: Honda, Yamaha, Suzuki...">
        <input id="editVehicleName" class="form-control" placeholder="Nama Kendaraan: Beat, Mio, Nex...">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary" id="saveEditPelanggan">Simpan</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalDetailPelanggan">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Detail Pelanggan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="detailContent"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/app.js"></script>
<script>
  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then((registration) => {
          console.log('ServiceWorker registration successful:', registration.scope);
        })
        .catch((error) => {
          console.log('ServiceWorker registration failed:', error);
        });
    });
  }
</script>
</body>
</html>

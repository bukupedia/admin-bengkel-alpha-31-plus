<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Pelanggan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="pelanggan">

<div id="navbar"></div>

<div class="container mt-4">
  <div class="d-flex justify-content-between">
    <h3>Data Pelanggan</h3>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPelanggan">
      + Tambah
    </button>
  </div>

  <input type="text" id="searchPelanggan" class="form-control mt-3" placeholder="Cari pelanggan...">

  <div class="table-responsive">
    <table class="table mt-3 table-hover">
      <thead class="table-light">
        <tr>
          <th>Nama</th>
          <th>No HP</th>
          <th>No. Polisi</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="pelangganTable"></tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="modalPelanggan">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Tambah Pelanggan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input id="namaPelanggan" class="form-control mb-2" placeholder="Nama" required>
        <input id="noHp" class="form-control mb-2" placeholder="No HP" type="tel" pattern="[0-9+\-\s\(\)]*">
        <input id="nomorPolisi" class="form-control" placeholder="Nomor Polisi Kendaraan">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="savePelanggan">Simpan</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/app.js"></script>
</body>
</html>

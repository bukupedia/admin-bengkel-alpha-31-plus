<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="bingbot" content="noindex, nofollow">
  <meta name="yandex" content="noindex, nofollow">
  <meta name="duckduckbot" content="noindex, nofollow">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#667eea">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <title>Riwayat Aktivitas - Bengkel App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="riwayat">

<div id="navbar"></div>

<div class="container mt-4">
  <h2>📜 Riwayat Aktivitas</h2>
  
  <!-- Filters -->
  <div class="row mt-3 g-2">
    <div class="col-md-4">
      <label class="form-label">Filter Tanggal:</label>
      <select id="filterTanggal" class="form-select">
        <option value="all">Semua</option>
        <option value="today">Hari ini</option>
        <option value="week">Seminggu Terakhir</option>
        <option value="month">Sebulan Terakhir</option>
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Jenis Aktivitas:</label>
      <select id="filterType" class="form-select">
        <option value="">Semua</option>
        <option value="servis">Servis</option>
        <option value="pelanggan">Pelanggan</option>
        <option value="sparepart">Sparepart</option>
        <option value="setting">Pengaturan</option>
      </select>
    </div>
  </div>
  
  <!-- Activity List -->
  <div class="card mt-4">
    <div class="card-body">
      <div id="activityList" class="list-group">
        <!-- Dynamic content -->
      </div>
      <div id="emptyActivity" class="text-center py-4 text-muted" style="display: none;">
        <p class="mb-1">📜</p>
        <p>Belum ada aktivitas</p>
      </div>
    </div>
  </div>
  
  <!-- Pagination -->
  <nav aria-label="Page navigation">
    <ul class="pagination justify-content-center mt-3" id="pagination"></ul>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/app.js"></script>
<script>
  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then((registration) => {
          console.log('ServiceWorker registration successful:', registration.scope);
        })
        .catch((error) => {
          console.log('ServiceWorker registration failed:', error);
        });
    });
  }
</script>

<script type="module">
import { getData, saveData } from "./assets/js/storage.js";

const ACTIVITY_KEY = "activity_log";
const ITEMS_PER_PAGE = 20;
let currentPage = 1;

// Initialize page
document.addEventListener("DOMContentLoaded", () => {
  renderActivityList();
  setupFilters();
});

function addActivity(type, action, description, data = {}) {
  const activities = getData(ACTIVITY_KEY) || [];
  const activity = {
    id: Date.now().toString(36) + Math.random().toString(36).substr(2),
    type,
    action,
    description,
    data,
    timestamp: new Date().toISOString()
  };
  activities.unshift(activity);
  saveData(ACTIVITY_KEY, activities);
}

function getFilteredActivities() {
  const activities = getData(ACTIVITY_KEY) || [];
  const dateFilter = document.getElementById("filterTanggal").value;
  const typeFilter = document.getElementById("filterType").value;
  
  let filtered = activities;
  
  // Filter by type
  if (typeFilter) {
    filtered = filtered.filter(a => a.type === typeFilter);
  }
  
  // Filter by date
  const now = new Date();
  if (dateFilter === "today") {
    const today = now.toISOString().split("T")[0];
    filtered = filtered.filter(a => a.timestamp.startsWith(today));
  } else if (dateFilter === "week") {
    const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
    filtered = filtered.filter(a => new Date(a.timestamp) >= weekAgo);
  } else if (dateFilter === "month") {
    const monthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
    filtered = filtered.filter(a => new Date(a.timestamp) >= monthAgo);
  }
  
  return filtered;
}

function formatTimestamp(ts) {
  const date = new Date(ts);
  return date.toLocaleString("id-ID", {
    day: "numeric",
    month: "short",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function getActivityIcon(type) {
  const icons = {
    servis: "🔧",
    pelanggan: "👤",
    sparepart: "🔩",
    setting: "⚙️"
  };
  return icons[type] || "📝";
}

function getActivityActionClass(action) {
  if (action === "create") return "text-success";
  if (action === "update") return "text-warning";
  if (action === "delete") return "text-danger";
  return "";
}

function renderActivityList() {
  const activities = getFilteredActivities();
  const container = document.getElementById("activityList");
  const emptyEl = document.getElementById("emptyActivity");
  
  if (activities.length === 0) {
    container.innerHTML = "";
    emptyEl.style.display = "block";
    return;
  }
  
  emptyEl.style.display = "none";
  
  // Pagination
  const totalPages = Math.ceil(activities.length / ITEMS_PER_PAGE);
  const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
  const endIndex = startIndex + ITEMS_PER_PAGE;
  const paginated = activities.slice(startIndex, endIndex);
  
  container.innerHTML = paginated.map(activity => `
    <div class="list-group-item list-group-item-action">
      <div class="d-flex w-100 justify-content-between align-items-center">
        <div>
          <span class="me-2">${getActivityIcon(activity.type)}</span>
          <strong>${activity.description}</strong>
        </div>
        <small class="text-muted">${formatTimestamp(activity.timestamp)}</small>
      </div>
      <small class="${getActivityActionClass(activity.action)}">${activity.action.toUpperCase()}</small>
    </div>
  `).join("");
  
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const container = document.getElementById("pagination");
  if (totalPages <= 1) {
    container.innerHTML = "";
    return;
  }
  
  let html = "";
  html += '<li class="page-item ' + (currentPage === 1 ? "disabled" : "") + '"><a class="page-link" href="#" data-page="' + (currentPage - 1) + '">Prev</a></li>';
  
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
      html += '<li class="page-item ' + (i === currentPage ? "active" : "") + '"><a class="page-link" href="#" data-page="' + i + '">' + i + "</a></li>";
    } else if (i === currentPage - 2 || i === currentPage + 2) {
      html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
    }
  }
  
  html += '<li class="page-item ' + (currentPage === totalPages ? "disabled" : "") + '"><a class="page-link" href="#" data-page="' + (currentPage + 1) + '">Next</a></li>';
  
  container.innerHTML = html;
  
  // Add click handlers
  container.querySelectorAll(".page-link").forEach(link => {
    link.addEventListener("click", (e) => {
      e.preventDefault();
      const page = parseInt(e.target.dataset.page);
      if (page && page !== currentPage && page > 0) {
        currentPage = page;
        renderActivityList();
      }
    });
  });
}

function setupFilters() {
  document.getElementById("filterTanggal").addEventListener("change", () => {
    currentPage = 1;
    renderActivityList();
  });
  
  document.getElementById("filterType").addEventListener("change", () => {
    currentPage = 1;
    renderActivityList();
  });
}

// Export for use in other modules
window.ActivityLog = {
  addActivity
};
</script>
</body>
</html>

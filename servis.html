<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Servis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="servis">

<div id="navbar"></div>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center">
    <h3>Data Servis</h3>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalServis">
      + Tambah Servis
    </button>
  </div>

  <div class="input-group mt-3">
    <input type="text" id="searchServis" class="form-control" placeholder="Cari berdasarkan nama pelanggan atau nomor polisi...">
    <button type="button" class="btn btn-outline-secondary" id="clearSearchServis" title="Hapus">✕</button>
  </div>

  <div class="row mt-3 g-2">
    <div class="col-md-4">
      <label class="form-label">Filter Tanggal:</label>
      <select id="filterTanggal" class="form-select">
        <option value="all">Semua</option>
        <option value="today">Hari ini</option>
        <option value="week">Seminggu Terakhir</option>
        <option value="month">Sebulan Terakhir</option>
        <option value="custom">Pilih Tanggal</option>
      </select>
    </div>
    <div class="col-md-4" id="customDateContainer" style="display: none;">
      <label class="form-label">Tanggal:</label>
      <input type="date" id="filterCustomDate" class="form-control">
    </div>
    <div class="col-md-4">
      <label class="form-label">Filter Status:</label>
      <select id="filterStatus" class="form-select">
        <option value="">Semua</option>
        <option value="menunggu">Menunggu</option>
        <option value="servicing">Diproses</option>
        <option value="selesai">Selesai</option>
        <option value="dibatalkan">Dibatalkan</option>
      </select>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered mt-3">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Pelanggan</th>
          <th>No. Polisi</th>
          <th>Total</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="servisTable"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalServis">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Tambah Servis</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">

  <input id="tanggal" type="date" class="form-control mb-2" required>

  <!-- Pelanggan Datalist -->
  <div class="mb-3">
    <label class="form-label">Pelanggan</label>
    <div class="input-group">
      <input type="text" id="customerInput" class="form-control" placeholder="Cari pelanggan..." list="customerDatalist">
      <button type="button" class="btn btn-outline-secondary" id="clearCustomer" title="Hapus pilihan">✕</button>
    </div>
    <datalist id="customerDatalist"></datalist>
    <input type="hidden" id="customerSelect">
    <div id="customerNote" class="small text-danger mt-1" style="display: none;"></div>
  </div>

  <!-- ITEM LIST -->
  <div id="itemContainer"></div>

  <button class="btn btn-sm btn-secondary mb-3" id="addItem">
    + Tambah Item
  </button>

  <!-- Catatan -->
  <div class="mb-3">
    <label class="form-label">Catatan</label>
    <textarea id="catatan" class="form-control" rows="2" placeholder="Tambahkan catatan (opsional)"></textarea>
  </div>

  <!-- TOTAL -->
  <div class="d-flex justify-content-between align-items-center">
    <h5>Total: <span id="totalDisplay">Rp 0</span></h5>
  </div>

</div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary" id="saveServis">Simpan</button>
      </div>
    </div>
  </div>
</div>

  <div class="modal fade" id="modalDetail">
  <div class="modal-dialog">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5>Detail Servis</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <p><strong>Pelanggan:</strong> <span id="detailCustomer"></span></p>
        <p><strong>No. Polisi:</strong> <span id="detailPoliceNumber"></span></p>
        <p><strong>Merek Kendaraan:</strong> <span id="detailVehicleBrand"></span></p>
        <p><strong>Tipe Kendaraan:</strong> <span id="detailVehicleName"></span></p>
        <p><strong>Tanggal:</strong> <span id="detailTanggal"></span></p>
        <p><strong>Status:</strong> <span id="detailStatus"></span></p>

        <hr>

        <h6>Item:</h6>
        <ul id="detailItems" class="list-group mb-3"></ul>

        <hr>

        <h6>Catatan:</h6>
        <p id="detailCatatan" class="text-muted fst-italic"></p>

        <h5>Total: <span id="detailTotal"></span></h5>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
      </div>

    </div>
  </div>
</div>

  <!-- Modal Edit Servis -->
  <div class="modal fade" id="modalEditServis">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5>Edit Servis</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
          <input type="hidden" id="editServisId">

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Tanggal</label>
              <input id="editTanggal" type="date" class="form-control" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label">Pelanggan</label>
              <input id="editCustomer" type="text" class="form-control" readonly>
            </div>
          </div>

          <!-- ITEM LIST -->
          <div id="editItemContainer"></div>

          <button class="btn btn-sm btn-secondary mb-3" id="editAddItem">
            + Tambah Item
          </button>

          <!-- Catatan -->
          <div class="mb-3">
            <label class="form-label">Catatan</label>
            <textarea id="editCatatan" class="form-control" rows="2" placeholder="Tambahkan catatan (opsional)"></textarea>
          </div>

          <!-- TOTAL -->
          <div class="d-flex justify-content-between align-items-center">
            <h5>Total: <span id="editTotalDisplay">Rp 0</span></h5>
          </div>

        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button class="btn btn-primary" id="saveEditServis">Simpan Perubahan</button>
        </div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/app.js"></script>
</body>
</html>

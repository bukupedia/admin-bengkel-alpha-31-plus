<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bengkel App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-logo h1 {
      color: #667eea;
      font-size: 2rem;
      margin: 0;
    }
    .login-logo p {
      color: #666;
      margin-top: 5px;
    }
    .form-control {
      border-radius: 8px;
      padding: 12px 15px;
    }
    .form-control:focus {
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
      border-color: #667eea;
    }
    .btn-login {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      width: 100%;
      transition: transform 0.2s;
    }
    .btn-login:hover {
      transform: translateY(-2px);
    }
    .error-message {
      color: #dc3545;
      font-size: 0.875rem;
      margin-top: 10px;
      text-align: center;
      display: none;
    }
    .footer-text {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <h1>🔧 Bengkel App</h1>
    <p>Admin Panel</p>
  </div>
  
  <form id="loginForm" aria-label="Form Login">
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input type="text" class="form-control" id="username" placeholder="Masukkan username" required autocomplete="username">
    </div>
    
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Masukkan password" required autocomplete="current-password">
    </div>
    
    <div class="error-message" id="errorMessage" role="alert" aria-live="polite"></div>
    
    <button type="submit" class="btn btn-primary btn-login">Masuk</button>
  </form>
  
  <div class="footer-text">
    Sistem manajemen bengkel
  </div>
</div>

<script type="module">
  import { isAuthenticated, login } from "./assets/js/modules/auth.js";

  // If already logged in, redirect to dashboard
  if (isAuthenticated()) {
    window.location.href = "dashboard.html";
  }

  document.getElementById("loginForm").addEventListener("submit", (e) => {
    e.preventDefault();
    
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMessage");
    
    const result = login(username, password);
    
    if (result.success) {
      window.location.href = "dashboard.html";
    } else {
      errorMsg.textContent = result.message;
      errorMsg.style.display = "block";
    }
  });
</script>

</body>
</html>
